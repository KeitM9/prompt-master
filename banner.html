<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 800px; height: 800px; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow: hidden; }

  .bg-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position: absolute;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(0,255,136,0.07) 0%, transparent 70%);
    top: -200px; left: -200px;
  }
  .bg-glow2 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
    bottom: -150px; right: -100px;
  }

  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    height: 100%;
    padding: 56px 60px;
    justify-content: space-between;
  }

  /* TOP */
  .top {}

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 32px;
  }
  .badge-dot { width: 7px; height: 7px; background: #00ff88; border-radius: 50%; flex-shrink: 0; }
  .badge span { color: #00ff88; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  .logo {
    font-size: 80px; font-weight: 900; line-height: 1;
    margin-bottom: 18px; letter-spacing: -3px;
  }
  .logo .white { color: #ffffff; }
  .logo .green { color: #00ff88; }

  .tagline {
    font-size: 22px; color: rgba(255,255,255,0.5);
    line-height: 1.5; margin-bottom: 0;
  }
  .tagline strong { color: rgba(255,255,255,0.85); font-weight: 600; }

  /* MIDDLE */
  .middle {}

  .modes {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .mode {
    background: #00ff88;
    border-radius: 100px;
    padding: 9px 20px;
    color: #000000;
    font-size: 14px; font-weight: 700;
  }
  .mode.ghost {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }

  /* BOTTOM */
  .bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
  }

  .price-block {}
  .price-label { font-size: 12px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .price { font-size: 56px; font-weight: 900; color: #ffffff; letter-spacing: -2px; line-height: 1; }
  .price span { font-size: 28px; color: rgba(255,255,255,0.45); font-weight: 400; }

  .partner-block { text-align: right; }
  .partner-label { font-size: 12px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .partner-value { font-size: 40px; font-weight: 900; color: #00ff88; letter-spacing: -1px; line-height: 1; }
  .partner-sub { font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 4px; }

  .brand {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.15);
    letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="container">
    <div class="top">
      <div class="badge">
        <div class="badge-dot"></div>
        <span>Тариф Мастер · Architect Systems AI</span>
      </div>
      <div class="logo">
        <span class="white">PROMPT</span><span class="green">MASTER</span>
      </div>
      <p class="tagline">
        <strong>Система создания промпт-запросов</strong><br>
        любой сложности на базе Claude AI
      </p>
    </div>

    <div class="middle">
      <div class="modes">
        <div class="mode">Контент</div>
        <div class="mode">Код</div>
        <div class="mode">Анализ</div>
        <div class="mode">Изображение</div>
        <div class="mode">Автоматизация</div>
        <div class="mode">Универсальный</div>
      </div>
    </div>

    <div class="bottom">
      <div class="price-block">
        <div class="price-label">Стоимость</div>
        <div class="price">4 900 <span>₽</span></div>
      </div>
      <div class="partner-block">
        <div class="partner-label">Партнёрская программа</div>
        <div class="partner-value">25%</div>
        <div class="partner-sub">Рекомендуй — зарабатывай</div>
      </div>
    </div>
  </div>

  <div class="brand">Architect Systems AI · Prompt Master</div>
</body>
</html>
